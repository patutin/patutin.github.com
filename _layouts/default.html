<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Roman Patutin",
    "jobTitle": "Principal Software Engineer",
    "worksFor": {
      "@type": "Organization",
      "name": "EPAM Systems"
    },
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Batumi",
      "addressCountry": "GE"
    },
    "image": "{{ '/Patutin.png' | absolute_url }}",
    "url": "{{ site.url }}",
    "sameAs": [
      "https://github.com/patutin",
      "https://www.linkedin.com/in/patutin/"
    ]
  }
  </script>
</head>
<body>

  <nav class="site-nav" aria-label="Primary">
    <div class="site-nav__inner">
      <a href="{{ '/' | relative_url }}" class="site-nav__logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        {{ site.title | default: site.github.repository_name }}
      </a>
      <div class="site-nav__links">
        <a href="{{ '/#about' | relative_url }}" class="site-nav__link">About</a>
        <a href="{{ '/#certifications' | relative_url }}" class="site-nav__link">Certifications</a>
        <a href="https://github.com/patutin" class="site-nav__link" target="_blank" rel="noopener" aria-label="GitHub profile">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          GitHub
        </a>
      </div>
    </div>
  </nav>

  <main class="page-main" id="main">
    {% if page.url != '/' and page.url != '/index.html' %}
    <div class="breadcrumb">
      <a href="{{ '/' | relative_url }}">← Home</a>
    </div>
    {% endif %}

    <article class="main-content">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <span>© {{ 'now' | date: "%Y" }} Roman Patutin — Principal Software Engineer</span>
      <span>
        <a href="https://github.com/patutin" target="_blank" rel="noopener">GitHub</a>
        ·
        <a href="https://www.linkedin.com/in/patutin/" target="_blank" rel="noopener">LinkedIn</a>
      </span>
    </div>
  </footer>

</body>
</html>
